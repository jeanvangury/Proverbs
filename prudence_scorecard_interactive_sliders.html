<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prudence Scorecard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background:#f5f7fb; }
    h1 { text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    th { background: #e9eefc; }
    input[type="range"] { width: 100%; }
    .score-value { font-weight: bold; }
    .result { margin-top: 20px; font-size: 18px; font-weight: bold; padding:10px; border-radius:8px; }
    .green { background:#d4edda; color:#155724; }
    .yellow { background:#fff3cd; color:#856404; }
    .red { background:#f8d7da; color:#721c24; }
    button { padding: 10px 20px; margin-top: 15px; cursor: pointer; }
    canvas { margin-top: 30px; }
  </style>
</head>
<body>

<h1>Prudence Self-Assessment Scorecard</h1>
<p>Rate yourself from <strong>1 (Very Weak)</strong> to <strong>8 (Very Strong)</strong></p>

<table>
  <tr>
    <th>#</th>
    <th>Characteristic</th>
    <th>Score</th>
  </tr>

  <script>
    const traits = [
      "Self-Controlled",
      "Selective in Speech",
      "Thoughtful in Action",
      "Discerning",
      "Teachable",
      "Kind in Speech",
      "Eager to Learn",
      "Forward-Looking"
    ];

    document.write(traits.map((t,i)=>`
      <tr>
        <td>${i+1}</td>
        <td>${t}</td>
        <td>
          <input type="range" min="1" max="8" value="4" id="c${i+1}" oninput="updateValue(${i+1})">
          <span class="score-value" id="v${i+1}">4</span>
        </td>
      </tr>
    `).join(''));
  </script>

</table>

<button onclick="calculateScore()">Calculate Score</button>

<div class="result" id="result"></div>

<canvas id="chart" width="400" height="400"></canvas>

<script>
function updateValue(i) {
  document.getElementById('v'+i).innerText = document.getElementById('c'+i).value;
}

let chart;

function calculateScore() {
  let total = 0;
  let scores = [];

  for (let i = 1; i <= 8; i++) {
    let val = parseInt(document.getElementById('c' + i).value);
    total += val;
    scores.push(val);
  }

  let message = "";
  let cssClass = "";

  if (total >= 56) {
    message = "Strong in prudence (Consistently practicing wisdom)";
    cssClass = "green";
  } else if (total >= 40) {
    message = "Growing in prudence (Good foundation, room to mature)";
    cssClass = "yellow";
  } else {
    message = "Needs intentional development";
    cssClass = "red";
  }

  let resultDiv = document.getElementById('result');
  resultDiv.className = 'result ' + cssClass;
  resultDiv.innerHTML = `Total Score: ${total}/64 <br> ${message}`;

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById('chart'), {
    type: 'radar',
    data: {
      labels: traits,
      datasets: [{
        label: 'Your Prudence Profile',
        data: scores
      }]
    },
    options: {
      scales: {
        r: {
          min: 0,
          max: 8,
          ticks: { stepSize: 1 }
        }
      }
    }
  });
}
</script>

</body>
</html>
