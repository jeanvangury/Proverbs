<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prudence Scorecard</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background:#f5f7fb; }
    h1 { text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; }
    th { background: #e9eefc; }
    input[type="number"] { width: 70px; padding:5px; }
    .result { margin-top: 20px; font-size: 18px; font-weight: bold; padding:10px; border-radius:8px; }
    .green { background:#d4edda; }
    .yellow { background:#fff3cd; }
    .red { background:#f8d7da; }
    .section { margin-top: 30px; }
  </style>
</head>
<body>

<h1>Prudence Scorecard</h1>
<p>Enter a score from 1 (Weak) to 8 (Strong)</p>

<table>
<tr>
<th>#</th><th>Proverb</th><th>Reference</th><th>Verse (NKJV)</th><th>Score</th>
</tr>

<script>
const data = [
{p:"Self-Controlled", ref:"Prov 12:16", verse:"A fool’s wrath is known at once, But a prudent man covers shame."},
{p:"Selective in Speech", ref:"Prov 12:23", verse:"A prudent man conceals knowledge, But the heart of fools proclaims foolishness."},
{p:"Thoughtful in Action", ref:"Prov 13:16", verse:"Every prudent man acts with knowledge, But a fool lays open his folly."},
{p:"Discerning", ref:"Prov 14:15", verse:"The simple believes every word, But the prudent considers well his steps."},
{p:"Teachable", ref:"Prov 15:5", verse:"A fool despises his father’s instruction, But he who receives correction is prudent."},
{p:"Kind in Speech", ref:"Prov 16:21", verse:"Sweetness of the lips increases learning."},
{p:"Eager to Learn", ref:"Prov 18:15", verse:"The heart of the prudent acquires knowledge."},
{p:"Forward-Looking", ref:"Prov 22:3", verse:"A prudent man foresees evil and hides himself."}
];

document.write(data.map((d,i)=>`
<tr>
<td>${i+1}</td>
<td>${d.p}</td>
<td>${d.ref}</td>
<td>${d.verse}</td>
<td>
<input type="number" min="1" max="8" id="c${i}" required>
</td>
</tr>
`).join(''));
</script>

</table>

<button onclick="calc()">Calculate</button>

<div id="result" class="result"></div>

<div class="section">
<h3>Scoring Guide</h3>
<ul>
<li><strong>56–64</strong> Strong in prudence</li>
<li><strong>40–55</strong> Growing</li>
<li><strong>25–39</strong> Needs development</li>
<li><strong>8–24</strong> Needs strong attention</li>
</ul>
</div>

<div class="section">
<h3>Insights</h3>
<p id="top"></p>
<p id="bottom"></p>
</div>

<script>
function calc(){
let scores=[];
let total=0;

for(let i=0;i<data.length;i++){
let input=document.getElementById('c'+i);
let val=parseInt(input.value);

if(!val || val<1 || val>8){
alert('Please enter a valid score (1-8) for all fields');
return;
}

scores.push({name:data[i].p, val});
total+=val;
}

let msg="";
let cls="";
if(total>=56){msg="Strong in prudence";cls="green"}
else if(total>=40){msg="Growing in prudence";cls="yellow"}
else if(total>=25){msg="Needs development";cls="red"}
else{msg="Needs strong attention";cls="red"}

result.className="result "+cls;
result.innerHTML=`Total: ${total}/64 - ${msg}`;

scores.sort((a,b)=>b.val-a.val);

top.innerHTML="Top Strengths: "+scores.slice(0,2).map(s=>s.name+" ("+s.val+")").join(", ");
bottom.innerHTML="Areas to Improve: "+scores.slice(-2).map(s=>s.name+" ("+s.val+")").join(", ");
}
</script>

</body>
</html>
